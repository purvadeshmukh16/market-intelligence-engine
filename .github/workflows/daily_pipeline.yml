name: Daily Market Intelligence Pipeline

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create env file
        run: |
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env

      - name: Create folders
        run: |
          mkdir -p data/raw
          mkdir -p data/processed/digests
          mkdir -p models

      - name: Initialize database
        run: python database/db_manager.py

      - name: Fetch stock prices
        run: python collectors/stock_collector.py

      - name: Fetch news articles
        run: python collectors/news_collector.py

      - name: Fetch StockTwits posts
        run: python collectors/stocktwits_collector.py

      - name: Score sentiment
        run: python sentiment/finbert_analyzer.py

      - name: Run correlation analysis
        run: python analysis/correlation.py

      - name: Train prediction models
        run: python analysis/prediction.py

      - name: Generate LLM digest
        continue-on-error: true
        run: python reports/digest_generator.py

      - name: Commit database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Auto update $(date '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
